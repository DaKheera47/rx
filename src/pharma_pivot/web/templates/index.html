<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaPivot</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #4b5563;
        --border: #d1d5db;
        --surface: #f9fafb;
        --btn-bg: #111827;
        --btn-fg: #ffffff;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        margin: 0;
      }

      .search-form {
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      .search-input {
        flex: 1;
        padding: 0.65rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--fg);
      }

      .submit-btn {
        padding: 0.65rem 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--btn-bg);
        color: var(--btn-fg);
        cursor: pointer;
      }

      .loading-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.85rem;
        color: var(--muted);
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--fg);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .htmx-indicator {
        display: none;
      }

      .htmx-request .htmx-indicator,
      .htmx-request.htmx-indicator {
        display: inline-flex;
      }

      .filter-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        align-items: center;
      }

      .filter-group label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main style="max-width: 900px; margin: 2rem auto; font-family: system-ui, sans-serif">
      <h1>PharmaPivot</h1>
      <p>Search generic drugs and view registered product names across SRA countries.</p>

      <form
        class="search-form"
        hx-get="/search"
        hx-target="#results"
        hx-indicator="#loading-indicator"
        hx-trigger="submit, keyup changed delay:400ms from:input[name='q']"
      >
        <input
          class="search-input"
          type="text"
          name="q"
          value="{{ query }}"
          placeholder="Type a generic drug name..."
          autocomplete="off"
        />
        <button class="submit-btn" type="submit">Submit</button>
      </form>

      <div id="loading-indicator" class="loading-wrap htmx-indicator" aria-live="polite" aria-label="Loading">
        <span class="spinner" aria-hidden="true"></span>
        <span>Loading...</span>
      </div>

      <div class="filter-group" style="margin-top: 1.25rem">
        <span style="font-weight: 600; font-size: 0.9rem; margin-right: 0.5rem">Filter by Country:</span>
        <label><input type="checkbox" name="country" value="USA" checked /> USA</label>
        <label><input type="checkbox" name="country" value="UK" checked /> UK</label>
        <label><input type="checkbox" name="country" value="Australia" checked /> Australia</label>
      </div>

      <section id="results" style="margin-top: 1.25rem">
        {% include 'partials/results_table.html' %}
      </section>
    </main>

    <script>
      function applyFilters() {
        const selectedCountries = Array.from(document.querySelectorAll('input[name="country"]:checked')).map(
          (cb) => cb.value
        );
        const rows = document.querySelectorAll("#results-table tbody tr");

        rows.forEach((row) => {
          if (row.classList.contains("no-results-row")) return;
          const country = row.getAttribute("data-country");
          if (selectedCountries.includes(country)) {
            row.style.display = "";
          } else {
            row.style.display = "none";
          }
        });
      }

      document.addEventListener("change", (e) => {
        if (e.target.name === "country") {
          applyFilters();
        }
      });

      document.addEventListener("htmx:afterSwap", (e) => {
        if (e.detail.target.id === "results") {
          applyFilters();
        }
      });
    </script>
  </body>
</html>
